name: CI

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v4
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Build (default features)
        run: cargo build --all-targets

      - name: Build (gui feature)
        run: cargo build --all-targets --features gui

      - name: Run library tests
        run: cargo test --lib

      - name: Run integration tests (no hardware)
        run: |
          cargo test --test config_parse
          cargo test --test control_protocol
          cargo test --test dispatcher_logic
          cargo test --test documentation
          cargo test --test drop_oldest_queue
          cargo test --test jsonl_schema
          cargo test --test pack_hd2_bundle
          cargo test --test packaging
          cargo test --test ui_distribution

  clippy:
    name: Clippy
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v4
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (gui feature)
        run: cargo clippy --all-targets --features gui -- -D warnings

  validate-pkgbuild:
    name: Validate AUR PKGBUILD
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PKGBUILD syntax and required fields
        run: |
          # Bash syntax check
          bash -n packaging/PKGBUILD && echo "PKGBUILD syntax OK"
          # Source the PKGBUILD and verify required fields are non-empty
          bash -c "
            source packaging/PKGBUILD
            for field in pkgname pkgver pkgrel arch license; do
              val=\${!field}
              [ -n \"\$val\" ] || { echo \"PKGBUILD missing required field: \$field\"; exit 1; }
              echo \"  \$field = \$val\"
            done
            echo 'All required fields present'
            # Verify build() and package() functions are defined
            declare -f build  > /dev/null || { echo 'Missing build() function'; exit 1; }
            declare -f package > /dev/null || { echo 'Missing package() function'; exit 1; }
            echo 'build() and package() functions defined'
          "
