name: CI

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Build (default features)
        run: cargo build --all-targets

      - name: Build (gui feature)
        run: cargo build --all-targets --features gui

      - name: Run library tests
        run: cargo test --lib

      - name: Run integration tests (no hardware)
        run: |
          cargo test --test config_parse
          cargo test --test control_protocol
          cargo test --test dispatcher_logic
          cargo test --test documentation
          cargo test --test drop_oldest_queue
          cargo test --test jsonl_schema
          cargo test --test pack_hd2_bundle
          cargo test --test packaging
          cargo test --test ui_distribution

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (gui feature)
        run: cargo clippy --all-targets --features gui -- -D warnings
