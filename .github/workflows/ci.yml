name: CI

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Build (default features)
        run: cargo build --all-targets

      - name: Build (gui feature)
        run: cargo build --all-targets --features gui

      - name: Run library tests
        run: cargo test --lib

      - name: Run integration tests (no hardware)
        run: |
          cargo test --test config_parse
          cargo test --test control_protocol
          cargo test --test dispatcher_logic
          cargo test --test documentation
          cargo test --test drop_oldest_queue
          cargo test --test jsonl_schema
          cargo test --test pack_hd2_bundle
          cargo test --test packaging
          cargo test --test ui_distribution

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (gui feature)
        run: cargo clippy --all-targets --features gui -- -D warnings

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    needs: [test, clippy]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev \
            librsvg2-bin \
            libfuse2 \
            wget

      - name: Install linuxdeploy and appimagetool
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage appimagetool-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Build AppImage
        run: bash packaging/appimage/build.sh
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Rename AppImage with version tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          mv vibe-attack-x86_64.AppImage "vibe-attack-${TAG}-x86_64.AppImage"

      - name: Create source tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="vibe-attack-${TAG}/" HEAD -o "vibe-attack-${TAG}.tar.gz"

      - name: Create HD2 pack bundle
        run: |
          TAG="${GITHUB_REF_NAME}"
          zip -j "hd2-${TAG}.hdpack" profiles/hd2/pack.yaml

      - name: Upload AppImage artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: appimage
          path: |
            vibe-attack-*-x86_64.AppImage
            vibe-attack-*.tar.gz
            hd2-*.hdpack

  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    needs: [test, clippy]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev \
            debhelper \
            patchelf

      - name: Stamp changelog with tag version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          DATE="$(date -R)"
          { echo "vibe-attack (${TAG}-1) unstable; urgency=medium"
            echo ""
            echo "  * Release ${TAG}."
            echo ""
            echo " -- Chris Chale <chrischale@gmail.com>  ${DATE}"
            echo ""
            cat packaging/debian/changelog
          } > /tmp/changelog.new
          cp /tmp/changelog.new packaging/debian/changelog

      - name: Build .deb package
        run: |
          ln -s packaging/debian debian
          dpkg-buildpackage -uc -us -b -d
          mv ../vibe-attack_*.deb .

      - name: Upload deb artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: deb
          path: vibe-attack_*.deb

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-appimage, build-deb]
    permissions:
      contents: write

    steps:
      - name: Download AppImage artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: appimage

      - name: Download deb artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: deb

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            vibe-attack-*-x86_64.AppImage
            vibe-attack-*.tar.gz
            hd2-*.hdpack
            vibe-attack_*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
