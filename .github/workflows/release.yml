name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev \
            librsvg2-bin \
            libfuse2 \
            wget

      - name: Install linuxdeploy and appimagetool
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage appimagetool-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Build AppImage
        run: bash packaging/appimage/build.sh
        env:
          # ORT shared library is copied to target/release/ by the ort crate
          # build script; build.sh's find_so() will locate it there.
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Rename AppImage with version tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          mv vibe-attack-x86_64.AppImage "vibe-attack-${TAG}-x86_64.AppImage"

      - name: Create source tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="vibe-attack-${TAG}/" HEAD -o "vibe-attack-${TAG}.tar.gz"

      - name: Create HD2 pack bundle
        run: |
          TAG="${GITHUB_REF_NAME}"
          zip -j "hd2-${TAG}.hdpack" profiles/hd2/pack.yaml

      - name: Upload AppImage artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: appimage
          path: |
            vibe-attack-*-x86_64.AppImage
            vibe-attack-*.tar.gz
            hd2-*.hdpack

  build-deb:
    name: Build Debian package
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev \
            debhelper \
            patchelf

      - name: Stamp changelog with tag version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          DATE="$(date -R)"
          # Prepend a new changelog entry so dpkg-buildpackage uses the tag version
          { echo "vibe-attack (${TAG}-1) unstable; urgency=medium"
            echo ""
            echo "  * Release ${TAG}."
            echo ""
            echo " -- Chris Chale <chrischale@gmail.com>  ${DATE}"
            echo ""
            cat packaging/debian/changelog
          } > /tmp/changelog.new
          cp /tmp/changelog.new packaging/debian/changelog

      - name: Build .deb package
        run: |
          ln -s packaging/debian debian
          dpkg-buildpackage -uc -us -b -d
          mv ../vibe-attack_*.deb .

      - name: Upload deb artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: deb
          path: vibe-attack_*.deb

  build-rpm:
    name: Build RPM package
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache sherpa-onnx prebuilt libs
        id: sherpa-cache
        uses: actions/cache@v5.0.5
        with:
          path: target/sherpa-onnx-prebuilt
          key: sherpa-onnx-1.12.39-linux-x64

      - name: Rebuild sherpa-onnx-sys if prebuilt cache missed
        if: steps.sherpa-cache.outputs.cache-hit != 'true'
        run: cargo build -p sherpa-onnx-sys

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libclang-dev \
            rpm \
            patchelf

      - name: Set up rpmbuild tree
        run: mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}

      - name: Create source tarball for rpmbuild
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          RPM_VERSION="$(echo "$TAG" | tr '-' '~')"
          git archive --format=tar.gz --prefix="vibe-attack-${RPM_VERSION}/" HEAD \
            -o ~/rpmbuild/SOURCES/vibe-attack-${RPM_VERSION}.tar.gz
          sed "s/^Version:.*/Version:        ${RPM_VERSION}/" packaging/vibe-attack.spec \
            > ~/rpmbuild/SPECS/vibe-attack.spec

      - name: Build RPM package
        run: |
          rpmbuild -bb --nodeps ~/rpmbuild/SPECS/vibe-attack.spec
          cp ~/rpmbuild/RPMS/x86_64/vibe-attack-*.x86_64.rpm .

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: rpm
          path: vibe-attack-*.x86_64.rpm

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-appimage, build-deb, build-rpm]
    permissions:
      contents: write

    steps:
      - name: Download AppImage artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: appimage

      - name: Download deb artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: deb

      - name: Download rpm artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: rpm

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vibe-attack-*-x86_64.AppImage
            vibe-attack-*.tar.gz
            hd2-*.hdpack
            vibe-attack_*.deb
            vibe-attack-*.x86_64.rpm
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
