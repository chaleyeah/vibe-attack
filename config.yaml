# vibe-attack — example configuration
# Copy to: $XDG_CONFIG_HOME/vibe-attack/config.yaml
# (usually: ~/.config/vibe-attack/config.yaml)
#
# Contract:
# - stdout is reserved for machine-readable JSONL transcript output
# - all logs/instrumentation go to stderr (via `tracing` / `eprintln!`)

ptt:
  key: KEY_LEFTCTRL  # evdev key name; run `evtest` to find your device's key names

audio:
  # CPAL device name for audio capture.  Run --list-devices to see all options.
  # Leave unset to use the system default (often wrong on multi-device Linux setups).
  device: "PipeWire Sound Server"

timing:
  dwell_ms: 50       # milliseconds each key is held down
  gap_ms: 30         # milliseconds between consecutive key events

pipeline:
  verbosity: summary        # summary | stages (stages emits per-stage timing events on stderr)
  listen_window_secs: 5     # after wake word trigger, stay LISTENING for this many seconds

vad:
  start_threshold: 0.60     # speech start threshold (hysteresis high)
  stop_threshold: 0.45      # speech stop threshold (hysteresis low)
  min_speech_ms: 100        # require at least this much speech before committing an utterance
  end_silence_ms: 200       # require this much silence to end an utterance
  preroll_ms: 150           # prepend up to this much audio before detected speech start
  tail_ms: 150              # append up to this much audio after detected speech end
  max_utterance_secs: 10    # cap utterance length; longer speech is force-flushed with a warning

stt:
  enabled: true
  model_path: models/whisper/ggml-tiny.en.bin  # local-only; not downloaded automatically
  initial_prompt: "reinforce, resupply, eagle airstrike, precision strike, railcannon, gas strike, sos beacon, autocannon, shield"

wake:
  enabled: true
  # sherpa-onnx keyword spotter artifacts (local-only; not downloaded automatically)
  # BPE KWS bundles: place `bpe.model` in the same directory as `encoder.onnx` (auto-detected).
  encoder: models/sherpa/kws/encoder.onnx
  decoder: models/sherpa/kws/decoder.onnx
  joiner: models/sherpa/kws/joiner.onnx
  tokens: models/sherpa/kws/tokens.txt
  keywords: models/sherpa/kws/keywords.txt

macros:
  - name: test_sequence
    keys:
      - key: KEY_UP
      - key: KEY_DOWN
      - key: KEY_LEFT
      - key: KEY_RIGHT
        dwell_ms: 100  # per-key override: hold RIGHT for 100ms instead of default 50ms
