  <line x1="128" y1="198" x2="128" y2="216" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="128" x2="58" y2="128" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="198" y1="128" x2="216" y2="128" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>

